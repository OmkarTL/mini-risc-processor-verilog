name: Verilog CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  rtl-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          echo "Mini RISC Processor Repository Structure"
          ls -R

      - name: Verify RTL Files
        run: |
          test -f rtl/alu.v
          test -f rtl/clock_divider.v
          test -f rtl/control_unit.v
          test -f rtl/instruction_memory.v
          test -f rtl/program_counter.v
          test -f rtl/register_file.v
          test -f rtl/risc_top.v

      - name: Verify Testbench
        run: |
          test -f testbench/risc_tb.v

      - name: Verify Constraints File
        run: |
          test -f constraints/risc_basys3.xdc

      - name: Workflow Success
        run: echo "All Mini RISC Processor checks passed successfully."